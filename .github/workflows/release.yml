name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # タグ名と Cargo.toml のバージョンが一致するか検証
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version match
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "tag=$TAG cargo=$CARGO_VER"
          if [ "$TAG" != "$CARGO_VER" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VER"
            exit 1
          fi
          echo "version=$CARGO_VER" >> "$GITHUB_OUTPUT"

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker compose build build

      - name: Build release binary
        run: |
          mkdir -p dist
          docker compose run --rm build

      - name: Verify binary exists
        run: |
          ls -la dist/switch-bt-ws-v*.exe
          file dist/switch-bt-ws-v*.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: switch-bt-ws-v${{ needs.verify.outputs.version }}
          path: dist/switch-bt-ws-v*.exe

  release:
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: switch-bt-ws-v${{ needs.verify.outputs.version }}
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: switch-bt-ws v${{ needs.verify.outputs.version }}
          generate_release_notes: true
          files: dist/switch-bt-ws-v*.exe
